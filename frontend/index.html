
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks AWS</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 20px;
      text-align: center;
      color: #38bdf8;
    }

    .task-form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #334155;
      color: white;
      font-size: 16px;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      padding: 14px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #0ea5e9;
      transform: scale(1.03);
    }

    ul {
      list-style: none;
    }

    li {
      background: #334155;
      margin-bottom: 12px;
      padding: 16px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status {
      color: #22c55e;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🚀 Tasks AWS</h1>

    <div class="task-form">
      <input id="title" placeholder="Digite uma tarefa" />
      <button onclick="createTask()">Adicionar</button>
    </div>
    <ul id="tasks"></ul>
  </div>

  <script>
    const API_URL = "https://w9swudo1r3.execute-api.us-east-1.amazonaws.com";
    async function loadTasks() {
  const res = await fetch(`${API_URL}/tasks`);
  const tasks = await res.json();

  const list = document.getElementById("tasks");
  list.innerHTML = "";

  tasks.forEach(task => {
    const li = document.createElement("li");

    li.innerHTML = `
      <div>
        <strong>${task.title}</strong>
      </div>

      <div>
        <span class="status">${task.status}</span>

        <button onclick="deleteTask('${task.taskId}')">
          Deletar
        </button>
      </div>
    `;

    list.appendChild(li);
  });
}
    

    async function createTask() {
      const title = document.getElementById("title").value;

      if (!title) {
        alert("Digite uma tarefa");
        return;
      }

      await fetch(`${API_URL}/tasks`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ title })
      });

      document.getElementById("title").value = "";

      loadTasks();
    }
async function createTask() {
      const title = document.getElementById("title").value;

      if (!title) {
        alert("Digite uma tarefa");
        return;
      }

      await fetch(`${API_URL}/tasks`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ title })
      });

      document.getElementById("title").value = "";

      loadTasks();
    }
async function deleteTask(taskId) {
    
        await fetch(`${API_URL}/tasks/${taskId}`, {
            method: "DELETE"
  });


    }

    loadTasks();
  </script>

</body>
</html>
